# nginx.prod.conf
# 本番環境用 nginx 設定
# SSL 終端、Socket.IO WebSocket プロキシ、静的コンテンツ配信を担当
#
# 使用前に YOUR_DOMAIN_HERE を実際のドメイン名に置き換えること
# 例: sed -i 's/YOUR_DOMAIN_HERE/example.com/g' nginx.prod.conf
#
# Let's Encrypt 証明書取得後、certbot_conf ボリュームに証明書が配置される

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # gzip 圧縮設定（帯域節約・レスポンス高速化）
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        image/svg+xml;

    # アップストリーム定義（docker-compose.prod.yml のサービス名と一致させること）
    upstream idea_backend_service {
        server idea-backend-prod:3000;
    }

    upstream frontend_service {
        server frontend-prod:80;
    }

    upstream admin_service {
        server admin-prod:80;
    }

    upstream python_embedding_service {
        server idobata-python-service-prod:8000;
    }

    # HTTP → HTTPS リダイレクト
    # Let's Encrypt の ACME チャレンジのみ HTTP で処理する
    server {
        listen 80;
        server_name YOUR_DOMAIN_HERE www.YOUR_DOMAIN_HERE;

        # Let's Encrypt ACME チャレンジ（証明書発行・更新時に使用）
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # それ以外はすべて HTTPS へリダイレクト
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS サーバー（メインの本番設定）
    server {
        listen 443 ssl http2;
        server_name YOUR_DOMAIN_HERE www.YOUR_DOMAIN_HERE;

        # Let's Encrypt SSL 証明書（certbot コンテナが管理）
        ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;

        # SSL プロトコルと暗号スイート（TLS 1.2/1.3 のみ許可）
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS（HTTPS 強制・中間者攻撃対策）
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ヘルスチェック
        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # Socket.IO WebSocket プロキシ
        # transports: ['websocket'] に限定しているため polling は不要
        # proxy_read_timeout を 24 時間に設定して長期 WebSocket 接続を維持する
        location /socket.io/ {
            proxy_pass http://idea_backend_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # WebSocket 接続を長期維持するための設定（300人同時接続対応）
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # いどばたビジョン バックエンド API
        location /api/idea/ {
            rewrite ^/api/idea/(.*)$ /$1 break;
            proxy_pass http://idea_backend_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Python 埋め込みサービス API
        location /api/python/ {
            rewrite ^/api/python/(.*)$ /$1 break;
            proxy_pass http://python_embedding_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 管理画面（/admin/ プレフィックスを除いてプロキシ）
        # admin アプリは vite base: '/admin/' でビルドされているため
        # ブラウザからは /admin/assets/... でアセットが参照される
        location /admin/ {
            proxy_pass http://admin_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # フロントエンド（SPA: React）
        # すべての未マッチリクエストをフロントエンドコンテナへ転送
        location / {
            proxy_pass http://frontend_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
