services:
  idea-backend:
    container_name: idea-backend-dev
    build:
      context: . # Change context to the root directory
      dockerfile: ./idea-discussion/backend/Dockerfile # Specify Dockerfile path relative to new context
      target: development # Build the development stage
    volumes:
      - ./idea-discussion/backend:/app/idea-discussion/backend # Mount source code for hot-reload
      # Exclude node_modules from the host mount to use the container's node_modules
      - /app/idea-discussion/backend/node_modules
    ports:
      - "${PORT:-3100}:3100" # Host port is configurable; container port stays fixed at 3100
    depends_on:
      - mongo
    env_file:
      - path: .env # Load environment variables from .env file (optional)
        required: false
    environment:
      - NODE_ENV=development
      - PORT=3100 # Keep internal listen port aligned with nginx upstream (fixed)
      # Override MONGODB_URI for Docker network
      - MONGODB_URI=mongodb://mongo:27017/idea_discussion_db # Use service name 'mongo'
      # Explicitly pass OpenRouter variables from .env
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required. Get your key at https://openrouter.ai/}
      - IDEA_CORS_ORIGIN=${IDEA_CORS_ORIGIN:-http://localhost:5173,http://localhost:5175}
      - JWT_SECRET=${JWT_SECRET:-dev_secret_key_do_not_use_in_production} # Pass JWT secret from .env
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-1d} # Pass expiration, default to 1 day
      - ALLOW_DELETE_THEME=${ALLOW_DELETE_THEME:-false} # Pass theme deletion control
    # Use the CMD defined in the Dockerfile's development stage
    command: npm run dev

  # --- Unified Frontend ---
  frontend:
    container_name: frontend-dev
    image: node:20-slim
    working_dir: /app
    volumes:
      - ./frontend:/app
      # Add node_modules volume
      - /app/node_modules
    ports:
      - "5173:5173" # idea-discussion/backendのCORS設定に合わせたポート
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=${IDEA_FRONTEND_API_BASE_URL:-http://localhost:3100} # 初期段階ではidea-discussionのAPIを使用
      - VITE_FRONTEND_ALLOWED_HOSTS=${VITE_FRONTEND_ALLOWED_HOSTS:-localhost,127.0.0.1}

  # --- Database ---
  mongo:
    container_name: mongo-dev
    image: mongo:latest
    ports:
      - "27017:27017" # Expose MongoDB port to host (optional, for external tools)
    volumes:
      - mongo_data:/data/db # Persist data using a named volume

  # --- Admin Panel ---
  admin:
    container_name: admin-dev
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./admin:/app
      - /app/node_modules
    ports:
      - "5175:5175"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=development
      - VITE_API_BASE_URL=${ADMIN_API_BASE_URL:-http://localhost:3100} # idea-discussionバックエンドを指す
      - VITE_ADMIN_FRONTEND_ALLOWED_HOSTS=${VITE_ADMIN_FRONTEND_ALLOWED_HOSTS:-localhost,127.0.0.1}
      - VITE_ALLOW_DELETE_THEME=${ALLOW_DELETE_THEME:-false}

  # --- Python Embedding Service ---
  python-service:
    container_name: idobata-python-service
    build:
      context: ./python-service
    ports:
      - "8000:8000" # Expose port for debugging
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required. Get your key at https://openrouter.ai/} # OpenRouter経由でEmbeddings APIを使用
    volumes:
      - ./python-service:/app # Mount source code for development
      - chroma_data:/data/chroma # ChromaDB data persistence

  nginx:
    container_name: nginx-prod
    image: nginx:latest
    profiles:
      - with-nginx # docker compose --profile with-nginx up で起動
    ports:
      - "80:80"
      - "443:443" # Uncomment if you configure SSL in nginx.conf
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment the following lines if you set up SSL certificates
      # - ./path/to/your/certs:/etc/nginx/certs:ro
    depends_on:
      - idea-backend
      - frontend
      - admin
      - python-service
    restart: always

volumes:
  mongo_data: # Define the named volume for MongoDB
  chroma_data: # Define the named volume for ChromaDB
