# docker-compose.prod.yml
# 本番環境用 Docker Compose 設定
# 使用方法: docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# 前提条件:
#   - .env.prod ファイルを .env.prod.template からコピーして設定済みであること
#   - DOMAIN: 本番ドメイン名を .env.prod に設定済みであること
#   - CF_API_TOKEN: Cloudflare API トークン（Zone:Zone:Read + Zone:DNS:Edit 権限）を .env.prod に設定済みであること
services:
  idea-backend:
    container_name: idea-backend-prod
    image: ghcr.io/kasseika/idobata/idea-backend:latest
    restart: always
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      - NODE_ENV=production
      # MongoDB 認証付き URI（.env.prod の MONGO_ROOT_USERNAME/PASSWORD を使用）
      # 注意: MONGO_ROOT_PASSWORD に URI 予約文字（@, :, /, +等）が含まれる場合は
      # パーセントエンコードが必要（例: @ → %40, : → %3A, / → %2F）
      # パスワード生成には URL セーフな文字のみを使用することを推奨
      - MONGODB_URI=mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/idea_discussion_db?authSource=admin
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - IDEA_CORS_ORIGIN=${IDEA_CORS_ORIGIN}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-1d}
      - ALLOW_DELETE_THEME=${ALLOW_DELETE_THEME:-false}

  frontend:
    container_name: frontend-prod
    image: ghcr.io/kasseika/idobata/frontend:latest
    restart: always

  admin:
    container_name: admin-prod
    image: ghcr.io/kasseika/idobata/admin:latest
    restart: always

  python-service:
    container_name: idobata-python-service-prod
    image: ghcr.io/kasseika/idobata/python-service:latest
    restart: always
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - chroma_data:/data/chroma

  mongo:
    container_name: mongo-prod
    image: mongo:7
    restart: always
    environment:
      # 初回起動時に認証付き root ユーザーを作成する
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    # セキュリティのためホストへのポート公開は行わない
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  caddy:
    container_name: caddy-prod
    image: ghcr.io/kasseika/idobata/caddy:latest
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN}
      - CF_API_TOKEN=${CF_API_TOKEN}
    depends_on:
      - idea-backend
      - frontend
      - admin
      - python-service
    restart: always

volumes:
  mongo_data:
  chroma_data:
  caddy_data:
  caddy_config:
