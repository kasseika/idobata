# docker-compose.prod.yml
# 本番環境・クイックスタート共通の Docker Compose 設定
#
# setup.sh が .env と Caddyfile を生成した上でこのファイルを docker-compose.yml として配置する。
# 直接使用する場合: docker compose up -d
#
# モード切り替えは .env の変数で制御:
#   - quickモード: CADDY_IMAGE=caddy:2-alpine（デフォルト）、MongoDB認証なし
#   - prodモード:  CADDY_IMAGE=ghcr.io/kasseika/idobata/caddy:latest、MongoDB認証あり、
#                  COMPOSE_PROFILES=watchtower でWatchtower有効化

services:
  idea-backend:
    image: ghcr.io/kasseika/idobata/idea-backend:latest
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=production
      - PORT=3100
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017/idea_discussion_db}
      - SYSTEM_CONFIG_ENCRYPTION_KEY=${SYSTEM_CONFIG_ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-1d}
      - IDEA_CORS_ORIGIN=${IDEA_CORS_ORIGIN:-http://localhost}
      - ALLOW_DELETE_THEME=${ALLOW_DELETE_THEME:-false}
      - API_BASE_URL=${API_BASE_URL:-http://localhost}
      - PASSWORD_PEPPER=${PASSWORD_PEPPER}
      - PYTHON_SERVICE_URL=http://python-service:8000

  frontend:
    image: ghcr.io/kasseika/idobata/frontend:latest
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  admin:
    image: ghcr.io/kasseika/idobata/admin:latest
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  python-service:
    image: ghcr.io/kasseika/idobata/python-service:latest
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    volumes:
      - chroma_data:/data/chroma

  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      # 空文字列の場合は MongoDB が認証なしで起動する
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:-}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-}
    volumes:
      - mongo_data:/data/db
    # セキュリティのためホストへのポート公開は行わない
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  caddy:
    # quickモード: caddy:2-alpine（デフォルト）
    # prodモード:  ghcr.io/kasseika/idobata/caddy:latest（Cloudflare DNS-01プラグイン入り）
    image: ${CADDY_IMAGE:-caddy:2-alpine}
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:${HTTPS_PORT:-443}/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-}
      - CF_API_TOKEN=${CF_API_TOKEN:-}
    depends_on:
      - idea-backend
      - frontend
      - admin
      - python-service

  # Watchtower: GHCRのイメージ更新を定期チェックして自動pull・再起動するサービス
  # watchtower.enable=true ラベルの付いたコンテナのみを対象とする
  # COMPOSE_PROFILES=watchtower を .env に設定することで有効化
  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    profiles:
      - watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_LABEL_ENABLE=true   # ラベル指定のコンテナのみ対象
      - WATCHTOWER_POLL_INTERVAL=300   # チェック間隔（秒）。デフォルト: 300秒（5分）
      - WATCHTOWER_CLEANUP=true        # 古いイメージを自動削除

volumes:
  mongo_data:
  chroma_data:
  caddy_data:
  caddy_config:
