# deploy.yml
# CD ワークフロー: mainブランチへのpush時にGHCRへDockerイメージをビルド・push
#
# フロー:
#   check（CIゲート） → build-and-push（GHCRへイメージpush）
#
# VPSへの反映は docker-compose.prod.yml の Watchtower が自動的に行う
# GitHub Secrets は不要（GHCRイメージはpublic）

name: deploy

on:
  push:
    branches: [main]

# デプロイは同時に1つのみ実行。進行中のデプロイはキャンセルしない
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Job 1: CIゲート（lint + typecheck + test）
  # デプロイ前の品質チェックとして実行
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - run: npm install
      - name: check
        run: npm run check

  # Job 2: Dockerイメージのビルド・GHCRへpush
  # 5サービスをmatrixで並列ビルド
  build-and-push:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: idea-backend
            context: .
            dockerfile: ./idea-discussion/backend/Dockerfile
            target: production
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile.prod
            target: ""
          - service: admin
            context: ./admin
            dockerfile: ./admin/Dockerfile.prod
            target: ""
          - service: python-service
            context: ./python-service
            dockerfile: ./python-service/Dockerfile
            target: ""
          - service: caddy
            context: .
            dockerfile: ./Dockerfile.caddy
            target: ""

    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildxのセットアップ
        uses: docker/setup-buildx-action@v3

      - name: GHCRへのログイン
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: イメージのビルドとpush（targetあり）
        if: matrix.target != ''
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: |
            ghcr.io/kasseika/idobata/${{ matrix.service }}:latest
            ghcr.io/kasseika/idobata/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: イメージのビルドとpush（targetなし）
        if: matrix.target == ''
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/kasseika/idobata/${{ matrix.service }}:latest
            ghcr.io/kasseika/idobata/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
