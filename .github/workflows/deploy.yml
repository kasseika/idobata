# deploy.yml
# CD ワークフロー: mainブランチへのpush時にGHCRへDockerイメージをビルド・push後、VPSへデプロイ
#
# フロー:
#   check（CIゲート） → build-and-push（GHCRへイメージpush） → deploy（VPSへデプロイ）
#
# 必要なGitHub Secrets（production環境）:
#   VPS_HOST        - VPSのIPまたはホスト名
#   VPS_USER        - SSHユーザー名
#   VPS_SSH_KEY     - SSH秘密鍵（ed25519推奨）
#   VPS_SSH_PORT    - SSHポート（デフォルト22）
#   VPS_KNOWN_HOSTS - VPSのSSHホスト公開鍵行（`ssh-keyscan -p <PORT> <HOST>` の出力）
#   GHCR_PAT        - （削除）VPS上の ~/.ghcr_pat に事前配置する方式に変更済み
#   DOMAIN          - 本番ドメイン（ヘルスチェック用）

name: deploy

on:
  push:
    branches: [main]

# デプロイは同時に1つのみ実行。進行中のデプロイはキャンセルしない
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Job 1: CIゲート（lint + typecheck + test）
  # デプロイ前の品質チェックとして実行
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - run: npm install
      - name: check
        run: npm run check

  # Job 2: Dockerイメージのビルド・GHCRへpush
  # 5サービスをmatrixで並列ビルド
  build-and-push:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: idea-backend
            context: .
            dockerfile: ./idea-discussion/backend/Dockerfile
            target: production
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile.prod
            target: ""
          - service: admin
            context: ./admin
            dockerfile: ./admin/Dockerfile.prod
            target: ""
          - service: python-service
            context: ./python-service
            dockerfile: ./python-service/Dockerfile
            target: ""
          - service: caddy
            context: .
            dockerfile: ./Dockerfile.caddy
            target: ""

    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildxのセットアップ
        uses: docker/setup-buildx-action@v3

      - name: GHCRへのログイン
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: イメージのビルドとpush（targetあり）
        if: matrix.target != ''
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: |
            ghcr.io/kasseika/idobata/${{ matrix.service }}:latest
            ghcr.io/kasseika/idobata/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: イメージのビルドとpush（targetなし）
        if: matrix.target == ''
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/kasseika/idobata/${{ matrix.service }}:latest
            ghcr.io/kasseika/idobata/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # Job 3: VPSへのデプロイ
  # 設定ファイルをbase64エンコードして単一SSHセッションで転送・デプロイ
  #
  # 必要なGitHub Secrets（追加）:
  #   VPS_KNOWN_HOSTS - VPSのSSHホスト公開鍵行（`ssh-keyscan -p <PORT> <HOST>`の出力）
  #                     MITM攻撃を防ぐため、事前に取得してシークレットに固定する
  #
  # VPS側の事前準備:
  #   1. GHCR_PAT: /proc/<pid>/cmdline 漏洩を防ぐためコマンドライン引数で渡さない
  #      read:packagesスコープのPATを事前配置すること:
  #        echo "YOUR_GHCR_PAT" > ~/.ghcr_pat && chmod 600 ~/.ghcr_pat
  #   2. .env.prod: docker compose で使用する本番環境変数ファイルを配置すること:
  #        ~/idobata/.env.prod（適切なパーミッション推奨: chmod 600）
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: SSH鍵のセットアップ
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # SSH秘密鍵を配置（printf を使用してエスケープ問題を回避）
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # ホスト公開鍵をシークレットから固定（ssh-keyscan は MITM に弱いため使用しない）
          printf '%s\n' "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: 設定ファイル転送とデプロイ実行（単一SSHセッション）
        run: |
          # 設定ファイルをbase64エンコードしてSSH経由で転送（scp の二重接続を回避）
          COMPOSE_B64=$(base64 -w0 docker-compose.prod.yml)
          CADDY_B64=$(base64 -w0 Caddyfile)
          # 非機密情報のみ引数として渡す（GHCR_PATはcmdline漏洩防止のため除外）
          ssh -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile="$HOME/.ssh/known_hosts" \
            -i ~/.ssh/deploy_key \
            -p ${{ secrets.VPS_SSH_PORT || 22 }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            bash -s -- \
              "${COMPOSE_B64}" \
              "${CADDY_B64}" \
              "${{ github.repository_owner }}" << 'ENDSSH'
          set -euo pipefail
          COMPOSE_B64="$1"
          CADDY_B64="$2"
          REPO_OWNER="$3"

          mkdir -p ~/idobata

          # base64デコードして設定ファイルを配置
          echo "${COMPOSE_B64}" | base64 -d > ~/idobata/docker-compose.prod.yml
          echo "${CADDY_B64}" | base64 -d > ~/idobata/Caddyfile

          cd ~/idobata

          # GHCRにログイン（PATは/proc漏洩防止のためVPS上のファイルから読み込む）
          # 事前準備: echo "YOUR_GHCR_PAT" > ~/.ghcr_pat && chmod 600 ~/.ghcr_pat
          GHCR_PAT=$(cat ~/.ghcr_pat)
          echo "${GHCR_PAT}" | docker login ghcr.io -u "${REPO_OWNER}" --password-stdin
          unset GHCR_PAT
          docker compose -f docker-compose.prod.yml pull

          # サービスを再起動（停止時間を最小化）
          docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

          # 不要イメージを削除してディスク節約
          docker image prune -f
          ENDSSH

      - name: ヘルスチェック
        run: |
          echo "ヘルスチェック開始: https://${{ secrets.DOMAIN }}/health"
          HTTP_STATUS="000"
          for i in $(seq 1 6); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 --connect-timeout 5 \
              "https://${{ secrets.DOMAIN }}/health" || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              break
            fi
            echo "リトライ ${i}/6: HTTP ${HTTP_STATUS}（10秒後に再試行）..."
            sleep 10
          done

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "ヘルスチェック成功: HTTP ${HTTP_STATUS}"
          else
            echo "ヘルスチェック失敗: HTTP ${HTTP_STATUS}"
            exit 1
          fi
