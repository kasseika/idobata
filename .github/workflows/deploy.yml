# deploy.yml
# CD ワークフロー: mainブランチへのpush時にGHCRへDockerイメージをビルド・push後、VPSへデプロイ
#
# フロー:
#   check（CIゲート） → build-and-push（GHCRへイメージpush） → deploy（VPSへデプロイ）
#
# 必要なGitHub Secrets（production環境）:
#   VPS_HOST     - VPSのIPまたはホスト名
#   VPS_USER     - SSHユーザー名
#   VPS_SSH_KEY  - SSH秘密鍵（ed25519推奨）
#   VPS_SSH_PORT - SSHポート（デフォルト22）
#   GHCR_PAT     - read:packagesスコープのPersonal Access Token（VPS→GHCR pull用）
#   DOMAIN       - 本番ドメイン（ヘルスチェック用）

name: deploy

on:
  push:
    branches: [main]

# デプロイは同時に1つのみ実行。進行中のデプロイはキャンセルしない
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Job 1: CIゲート（lint + typecheck + test）
  # デプロイ前の品質チェックとして実行
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - run: npm install
      - name: check
        run: npm run check

  # Job 2: Dockerイメージのビルド・GHCRへpush
  # 4サービスをmatrixで並列ビルド
  build-and-push:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: idea-backend
            context: .
            dockerfile: ./idea-discussion/backend/Dockerfile
            target: production
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile.prod
            target: ""
          - service: admin
            context: ./admin
            dockerfile: ./admin/Dockerfile.prod
            target: ""
          - service: python-service
            context: ./python-service
            dockerfile: ./python-service/Dockerfile
            target: ""

    steps:
      - uses: actions/checkout@v4

      - name: Docker Buildxのセットアップ
        uses: docker/setup-buildx-action@v3

      - name: GHCRへのログイン
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: イメージのビルドとpush（targetあり）
        if: matrix.target != ''
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: |
            ghcr.io/kasseika/idobata/${{ matrix.service }}:latest
            ghcr.io/kasseika/idobata/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: イメージのビルドとpush（targetなし）
        if: matrix.target == ''
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/kasseika/idobata/${{ matrix.service }}:latest
            ghcr.io/kasseika/idobata/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # Job 3: VPSへのデプロイ
  # 設定ファイルをSCPで転送後、SSHでdocker compose pull & up
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: 設定ファイルをVPSへ転送
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          source: "docker-compose.prod.yml,nginx.prod.conf"
          target: "~/idobata"

      - name: VPSでデプロイ実行
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            cd ~/idobata

            # nginx.prod.conf の YOUR_DOMAIN_HERE を実際のドメインに置換
            sed -i 's/YOUR_DOMAIN_HERE/${{ secrets.DOMAIN }}/g' nginx.prod.conf

            # GHCRにログインして最新イメージをpull
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull

            # サービスを再起動（停止時間を最小化）
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

            # 不要イメージを削除してディスク節約
            docker image prune -f

      - name: ヘルスチェック
        run: |
          echo "ヘルスチェック開始: https://${{ secrets.DOMAIN }}/health"
          HTTP_STATUS="000"
          for i in $(seq 1 6); do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 --connect-timeout 5 \
              "https://${{ secrets.DOMAIN }}/health" || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              break
            fi
            echo "リトライ ${i}/6: HTTP ${HTTP_STATUS}（10秒後に再試行）..."
            sleep 10
          done

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "ヘルスチェック成功: HTTP ${HTTP_STATUS}"
          else
            echo "ヘルスチェック失敗: HTTP ${HTTP_STATUS}"
            exit 1
          fi
