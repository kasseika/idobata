# nginx.init.conf
# 初回 SSL 証明書取得専用の一時 nginx 設定
#
# 使用タイミング:
#   Let's Encrypt の証明書が存在しない初回デプロイ時にのみ使用する
#   deploy.sh が自動的にこのファイルを使用して certbot の ACME チャレンジを処理する
#
# nginx.prod.conf との違い:
#   - SSL 設定なし（証明書が存在しないため）
#   - ACME チャレンジのみを処理する最小構成

worker_processes auto;

events {
    worker_connections 256;
}

http {
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME チャレンジ（証明書発行時に使用）
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # その他のリクエストは 503 を返す（証明書取得中のため）
        location / {
            return 503 "SSL certificate is being issued. Please wait.";
            add_header Content-Type text/plain;
        }
    }
}
